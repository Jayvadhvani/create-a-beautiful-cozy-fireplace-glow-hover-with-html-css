  <title>Create a Beautiful Cozy Fireplace Glow Hover with HTML &amp; CSS</title>
  <style>
    body { background: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
    
    .fire-card {
      width: 300px;
      padding: 40px;
      background: #1e293b;
      border-radius: 12px;
      text-align: center;
      color: #94a3b8;
      cursor: pointer;
      position: relative;
      transition: 0.5s ease;
      /* default subtle static glow */
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    
    h3 { color: #f8fafc; transition: color 0.5s; font-size: 1.5rem; margin-top: 0;}
    
    .fire-card:hover {
      background: #2a161f;
      /* The Fireplace Box Shadow Base */
      box-shadow: 
        0 0 20px rgba(234, 88, 12, 0.6),
        0 0 60px rgba(220, 38, 38, 0.3),
        inset 0 0 15px rgba(249, 115, 22, 0.2);
      transform: translateY(-5px);
      /* Flicker activates on hover */
      animation: flicker 0.2s infinite alternate;
    }
    
    .fire-card:hover h3 { color: #fed7aa; /* Warms up the text too! */ }
    
    @keyframes flicker {
      0%   { box-shadow: 0 0 15px rgba(234, 88, 12, 0.5), 0 0 40px rgba(220, 38, 38, 0.2), inset 0 0 20px rgba(249, 115, 22, 0.1); }
      50%  { box-shadow: 0 3px 25px rgba(234, 88, 12, 0.8), 0 -2px 70px rgba(220, 38, 38, 0.4), inset 0 0 10px rgba(249, 115, 22, 0.3); }
      100% { box-shadow: 0 -2px 18px rgba(234, 88, 12, 0.6), 0 3px 55px rgba(220, 38, 38, 0.3), inset 0 0 15px rgba(249, 115, 22, 0.2); }
    }
  </style>
